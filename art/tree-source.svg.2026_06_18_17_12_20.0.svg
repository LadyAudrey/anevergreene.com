<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  AnEvergreene hub — tree source file
  ====================================
  Open in Inkscape. Redraw the tree freely.
  The IMPORTANT thing is that each branch ends at one of the six "link tip"
  positions marked below in the "link-anchors" layer. Those coordinates are
  hard-wired in the website code; if you move them, tell Claude the new x,y.

  ViewBox is -100 0 600 620 — so x ranges from -100 to 500, y from 0 to 620.
  Trunk base is around x=200, bottom of the canvas (y=620).

  Layers:
    1. background-guide  — faint dotted rectangle showing the safe area
    2. link-anchors      — six dots marking where branches MUST end
    3. tree              — your hand-drawn tree (replace the placeholder paths)
-->

